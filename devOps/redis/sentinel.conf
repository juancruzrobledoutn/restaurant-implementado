# Redis Sentinel Configuration for Integrador
#
# Sentinel monitors the Redis master and triggers automatic failover
# if the master becomes unreachable. In this setup, we run a single
# sentinel alongside the single Redis instance. For full HA in production,
# run 3 sentinels on separate hosts (quorum = 2).
#
# Usage: redis-sentinel /etc/redis/sentinel.conf

# Port for Sentinel (default 26379)
port 26379

# Monitor the Redis master named "integrador-redis"
# The last number (2) is the quorum: how many sentinels must agree
# that the master is down before triggering failover.
# With a single sentinel, use quorum = 1.
sentinel monitor integrador-redis redis 6379 1

# Time in milliseconds before considering the master as subjectively down
# 5 seconds is a good balance between fast detection and false positives
sentinel down-after-milliseconds integrador-redis 5000

# Timeout for the failover process
# If failover doesn't complete within this time, it's considered failed
sentinel failover-timeout integrador-redis 10000

# How many replicas can be reconfigured simultaneously during failover
# Lower = safer (less load spike), higher = faster failover
sentinel parallel-syncs integrador-redis 1

# Deny access from external scripts (security)
sentinel deny-scripts-reconfig yes

# Log level
loglevel notice
