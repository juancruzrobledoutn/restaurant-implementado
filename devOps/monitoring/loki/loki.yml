# Loki Configuration for Integrador (C-23: monitoring-production)
# Log aggregation: filesystem storage, configurable retention.
#
# Storage: local filesystem in /loki (backed by named Docker volume loki-data)
# Retention: 30 days by default, overridable via LOKI_RETENTION_PERIOD env var
# Ingestion: optimized for small-medium SaaS (single restaurant tenant at launch)

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks

limits_config:
  # Ingestion limits suitable for small SaaS deployment
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 6
  max_streams_per_user: 1000
  max_entries_limit_per_query: 5000
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7 days

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# Retention period — override via LOKI_RETENTION_PERIOD env var (e.g. "720h" = 30d)
# Docker Compose passes the env var; this default is used when running standalone.
table_manager:
  retention_deletes_enabled: true
  retention_period: 720h  # 30 days default

analytics:
  reporting_enabled: false
