# Promtail Configuration for Integrador
# Scrapes Docker container logs, parses JSON, pushes to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # -----------------------------------------------------------------------
  # Docker container logs (via mounted Docker socket / log directory)
  # -----------------------------------------------------------------------
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: integrador
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker JSON log wrapper
      - docker: {}

      # Extract container name from filename path
      - regex:
          source: filename
          expression: '/var/lib/docker/containers/(?P<container_id>[^/]+)/.*'

      # Label based on container name (set by docker labels below)
      - labels:
          container_id:

      # Parse JSON structured logs from backend/ws_gateway (production mode)
      # The backend emits: {"timestamp":"...","level":"...","logger":"...","message":"..."}
      - match:
          selector: '{job="integrador"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  message: message
                  request_id: request_id
                  timestamp: timestamp
            - labels:
                level:
                logger:
            - timestamp:
                source: timestamp
                format: RFC3339Nano
                fallback_formats:
                  - "2006-01-02T15:04:05.999999999Z07:00"

  # -----------------------------------------------------------------------
  # Docker service discovery (label-based, preferred method)
  # -----------------------------------------------------------------------
  - job_name: docker-sd
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            values: ["com.docker.compose.project=devops"]

    relabel_configs:
      # Use container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Use compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Add project label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project

    pipeline_stages:
      - docker: {}

      # Parse JSON from backend services
      - match:
          selector: '{service=~"backend.*|ws_gateway.*"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  request_id: request_id
            - labels:
                level:
                logger:

      # Parse nginx access logs
      - match:
          selector: '{service="nginx"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>[\w.]+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) (?P<protocol>\S+)" (?P<status>\d+) (?P<body_bytes_sent>\d+)'
            - labels:
                method:
                status:
