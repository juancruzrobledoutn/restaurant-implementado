# Staging Docker Compose for Integrador
#
# Designed for EasyPanel deployment on a single VPS (Hostinger KVM4 or similar).
#
# What's INCLUDED (functional minimum):
#   - PostgreSQL with pgvector
#   - Redis (cache, pub/sub, streams)
#   - Backend REST API (FastAPI) — 1 replica, 2 workers
#   - WebSocket Gateway — 1 replica, 1 worker
#
# What's EXCLUDED vs production (and why):
#   - nginx + certbot           → EasyPanel handles SSL + reverse proxy
#   - backend-2, ws_gateway_2   → no need for HA in staging (~10 testers)
#   - redis-sentinel            → only useful with master/slave replicas
#   - Prometheus/Grafana/Loki   → no observability needed for feature testing
#   - pgadmin                   → user opted out
#
# Frontends (Dashboard, pwaMenu, pwaWaiter) deploy SEPARATELY to Vercel.
# This compose ONLY runs the backend services.
#
# IMPORTANT — env var strategy for EasyPanel:
#   Docker Compose interpolates ${VAR} at PARSE time (before merging override files).
#   EasyPanel passes user-defined env vars via an auto-generated override file —
#   that's container-level env, NOT shell env, so interpolation cannot see them.
#
#   Workaround: this file uses ${VAR:-default} (with placeholder defaults) so that
#   compose parses successfully. EasyPanel's override then sets the REAL values
#   directly in each container's environment, taking precedence over the defaults.
#
#   YOU MUST set these in EasyPanel's env panel (otherwise placeholders are used):
#     POSTGRES_PASSWORD       — the real DB password
#     DATABASE_URL            — full connection string (constructed with the password above)
#     JWT_SECRET              — min 32 chars
#     TABLE_TOKEN_SECRET      — min 32 chars (different from JWT)
#     ALLOWED_ORIGINS         — comma-separated frontend URLs
#     WS_ALLOWED_ORIGINS      — comma-separated frontend URLs (same as above)

services:
  # --- PostgreSQL with pgvector ---
  db:
    image: pgvector/pgvector:pg16
    container_name: integrador_db_staging
    environment:
      # POSTGRES_DB and POSTGRES_USER are hardcoded for consistency with DATABASE_URL.
      # If you change them here, also update DATABASE_URL in EasyPanel env.
      POSTGRES_DB: integrador_staging
      POSTGRES_USER: integrador
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-INSECURE_PLACEHOLDER_OVERRIDE_IN_EASYPANEL}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
    # No port exposure — only internal Docker network access (backend reaches db:5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrador -d integrador_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # --- Redis (cache + pub/sub + streams) ---
  redis:
    image: redis:7-alpine
    container_name: integrador_redis_staging
    volumes:
      - redisdata-staging:/data
    # No port exposure — only internal Docker network access
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

  # --- Backend REST API (FastAPI) ---
  backend:
    build:
      # Context = backend/ (the Dockerfile expects this layout)
      context: ../backend
      dockerfile: Dockerfile
    container_name: integrador_backend_staging
    environment:
      - ENVIRONMENT=staging
      - DEBUG=false
      # DATABASE_URL must be set in EasyPanel env vars (full connection string).
      # The default below is a placeholder that won't connect — replace via EasyPanel.
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://integrador:INSECURE_PLACEHOLDER_OVERRIDE_IN_EASYPANEL@db:5432/integrador_staging}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-INSECURE_JWT_OVERRIDE_IN_EASYPANEL_min32chars_____________}
      - JWT_ISSUER=${JWT_ISSUER:-integrador-staging}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-integrador-users}
      - TABLE_TOKEN_SECRET=${TABLE_TOKEN_SECRET:-INSECURE_TABLE_TOKEN_OVERRIDE_IN_EASYPANEL_min32_______}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - JWT_TABLE_TOKEN_EXPIRE_HOURS=${JWT_TABLE_TOKEN_EXPIRE_HOURS:-3}
      # ALLOWED_ORIGINS hardcoded a las URLs de Vercel del staging.
      # EasyPanel no propaga env vars de la UI a docker-compose interpolation
      # de forma confiable, asi que el default es la fuente de verdad.
      # Si cambias las URLs de Vercel, editar aqui y redeployar.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://restaurant-pwawaiter.vercel.app,https://restaurant-pwamenu.vercel.app,https://restaurant-implementado.vercel.app}
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # No volume mount — staging runs built code, not host source.
    # Migrations + seed run on every startup (both are idempotent).
    # Array form + exec to avoid double-shell wrapping that may eat flags.
    command:
      - sh
      - -c
      - "alembic upgrade head && python -m rest_api.seeds.runner && exec python -m uvicorn rest_api.main:app --host 0.0.0.0 --port 8000 --workers 1 --limit-concurrency 50 --timeout-keep-alive 30 --access-log"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # --- WebSocket Gateway ---
  ws_gateway:
    build:
      context: ..
      dockerfile: ws_gateway/Dockerfile
    container_name: integrador_ws_gateway_staging
    environment:
      - ENVIRONMENT=staging
      - DEBUG=false
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-INSECURE_JWT_OVERRIDE_IN_EASYPANEL_min32chars_____________}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - TABLE_TOKEN_SECRET=${TABLE_TOKEN_SECRET:-INSECURE_TABLE_TOKEN_OVERRIDE_IN_EASYPANEL_min32_______}
      - TABLE_TOKEN_TTL_SECONDS=${TABLE_TOKEN_TTL_SECONDS:-10800}
      # WS_ALLOWED_ORIGINS hardcoded — mismo motivo que ALLOWED_ORIGINS arriba.
      - WS_ALLOWED_ORIGINS=${WS_ALLOWED_ORIGINS:-https://restaurant-pwawaiter.vercel.app,https://restaurant-pwamenu.vercel.app,https://restaurant-implementado.vercel.app}
      - WS_ALLOW_NO_ORIGIN=false
      - WS_MAX_CONNECTIONS=${WS_MAX_CONNECTIONS:-200}
      - WS_MAX_CONNECTIONS_PER_USER=${WS_MAX_CONNECTIONS_PER_USER:-3}
      - WS_BROADCAST_WORKERS=${WS_BROADCAST_WORKERS:-5}
      - WS_BROADCAST_QUEUE_SIZE=${WS_BROADCAST_QUEUE_SIZE:-2000}
      - WS_STREAM_CRITICAL=${WS_STREAM_CRITICAL:-events:critical}
      - WS_STREAM_GROUP=${WS_STREAM_GROUP:-ws_gateway_group}
      - WS_STREAM_DLQ=${WS_STREAM_DLQ:-events:dlq}
      - PYTHONPATH=/app/backend
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "ws_gateway.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1", "--limit-concurrency", "100", "--timeout-keep-alive", "65", "--access-log"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 192M
          cpus: "0.25"

volumes:
  pgdata-staging:
    name: integrador_pgdata_staging
  redisdata-staging:
    name: integrador_redisdata_staging
