# Nginx Load Balancer Configuration for Integrador — TLS/HTTPS
# Handles REST API load balancing, WebSocket sticky sessions, and SSL termination.
#
# Architecture:
#   Client -> Nginx:80  -> 301 redirect to HTTPS
#   Client -> Nginx:443 -> /api/*    -> backend_api (round-robin, 2 servers)
#                       -> /ws/*     -> ws_gateway  (ip_hash sticky, 2 servers)
#                       -> /health   -> local 200
#
# Certificates managed by Certbot (Let's Encrypt) via shared Docker volumes.

worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ─── Basic Settings ───────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # Hide nginx version
    server_tokens off;

    # ─── Logging ──────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ─── Gzip Compression ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # ─── SSL Session Cache ───────────────────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── Rate Limiting Zones ─────────────────────────────────────────
    # General API: 10 requests/second per IP (burst allows short spikes)
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

    # Auth endpoints: 2 requests/second per IP (stricter for login/refresh)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=2r/s;

    # WebSocket connections: 5 per second per IP
    limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=5r/s;

    # Rate limit response
    limit_req_status 429;

    # ─── Upstreams ───────────────────────────────────────────────────
    # REST API backend: least-conn (stateless, JWT-based auth)
    upstream backend_api {
        least_conn;
        server integrador_backend_1:8000 max_fails=3 fail_timeout=30s;
        server integrador_backend_2:8000 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # WebSocket Gateway: ip_hash for sticky sessions
    # WebSocket connections are long-lived and MUST stay on the same backend.
    upstream ws_gateway {
        ip_hash;
        server integrador_ws_gateway_1:8001 max_fails=3 fail_timeout=30s;
        server integrador_ws_gateway_2:8001 max_fails=3 fail_timeout=30s;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (must be accessible over HTTP)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Server Block ──────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # ─── SSL Certificate (Let's Encrypt) ────────────────────────
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        # ─── SSL Protocol & Cipher Configuration ────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # ─── OCSP Stapling ──────────────────────────────────────────
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ─── Diffie-Hellman Parameters (optional, generate with:
        #      openssl dhparam -out /etc/letsencrypt/dhparam.pem 2048) ─
        # ssl_dhparam /etc/letsencrypt/dhparam.pem;

        # Max request body size (for image uploads, etc.)
        client_max_body_size 10m;

        # ─── Security Headers ────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ─── Health Check (nginx itself) ─────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ─── Auth Endpoints (stricter rate limit) ────────────────────
        location ~ ^/api/auth/(login|refresh) {
            limit_req zone=api_auth burst=5 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ─── REST API (general rate limit) ───────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings for API responses
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 16k;
        }

        # ─── WebSocket Gateway ───────────────────────────────────────
        location /ws/ {
            limit_req zone=ws_connect burst=10 nodelay;

            proxy_pass http://ws_gateway;
            proxy_http_version 1.1;

            # CRITICAL: WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections are long-lived:
            # - read timeout must exceed heartbeat interval (30s ping + margin)
            # - send timeout for slow clients
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # No buffering for WebSocket frames
            proxy_buffering off;
            proxy_cache off;
        }

        # ─── Deny access to hidden files ─────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ─── Default: 404 ────────────────────────────────────────────
        location / {
            return 404 '{"error":"Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
